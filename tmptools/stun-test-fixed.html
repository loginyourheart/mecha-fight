<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUN 服务器延迟测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        h1 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: 2px solid #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: rgba(0, 212, 255, 0.3);
            transform: scale(1.05);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .results {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
        }
        .results-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            font-weight: bold;
            padding: 10px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .result-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            padding: 12px 10px;
            border-bottom: 1px solid #333;
            align-items: center;
        }
        .result-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .server-addr {
            font-family: monospace;
            font-size: 14px;
        }
        .latency {
            font-weight: bold;
            font-size: 16px;
        }
        .latency.excellent { color: #00ff00; }
        .latency.good { color: #88ff00; }
        .latency.average { color: #ffff00; }
        .latency.poor { color: #ff8800; }
        .latency.failed { color: #ff4444; }
        .status {
            font-size: 12px;
        }
        .summary {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            border: 1px solid #00d4ff;
        }
        .summary h3 {
            color: #00d4ff;
            margin-bottom: 10px;
        }
        .summary-item {
            margin: 5px 0;
            font-size: 14px;
        }
        .best-servers {
            margin-top: 15px;
        }
        .best-server {
            display: inline-block;
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00ff00;
            padding: 8px 15px;
            border-radius: 20px;
            margin: 5px;
            font-family: monospace;
        }
        .progress {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff00);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #000;
            font-weight: bold;
        }
        .geo-info {
            font-size: 11px;
            color: #888;
        }
        .warning {
            background: rgba(255, 165, 0, 0.2);
            border: 1px solid orange;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 STUN 服务器延迟测试</h1>
    
    <div class="warning">
        <strong>⚠️ 注意：</strong>此工具只统计能够返回服务器反射候选(srflx)的 STUN 服务器，本地候选不计入成功！
    </div>
    
    <div class="controls">
        <button id="testAllBtn" onclick="testAllServers()">测试所有服务器</button>
        <button id="testTopBtn" onclick="testTopServers()">测试延迟最低的5个</button>
        <button id="stopBtn" onclick="stopTest()" disabled>停止测试</button>
        <button onclick="clearResults()">清空结果</button>
        <button onclick="copyBestServers()">复制最佳服务器</button>
    </div>
    
    <div class="progress" id="progressBar" style="display: none;">
        <div class="progress-bar" id="progressFill">0%</div>
    </div>
    
    <div class="results">
        <div class="results-header">
            <div>服务器地址</div>
            <div>延迟 (ms)</div>
            <div>状态</div>
            <div>地理位置</div>
        </div>
        <div id="resultsList"></div>
    </div>
    
    <div class="summary" id="summary" style="display: none;">
        <h3>📊 测试摘要</h3>
        <div class="summary-item">总测试服务器: <span id="totalServers">0</span></div>
        <div class="summary-item">成功: <span id="successCount" style="color: #00ff00;">0</span></div>
        <div class="summary-item">失败: <span id="failedCount" style="color: #ff4444;">0</span></div>
        <div class="summary-item">平均延迟: <span id="avgLatency">0</span> ms</div>
        
        <div class="best-servers">
            <strong>🏆 最佳服务器（可复制到游戏配置中）:</strong>
            <div id="bestServersList"></div>

    </div>

        const GEO_HINTS = {

            '197.': '尼日利亚/非洲',
            '202.': '新西兰/澳大利亚',
            '203.': '澳大利亚',
            '209.': '美国',
            '212.': '德国',
            '217.': '德国 (Intergenia)',
            '88.99.': '德国 (Hetzner)',
            '88.218.': '波兰'
        };

        let results = [];
        let testing = false;
        let stopped = false;
        let bestServers = [];

        function getGeoHint(ip) {
            const prefix = ip.split('.')[0] + '.';
            const prefix2 = ip.split('.').slice(0, 2).join('.') + '.';
            
            for (const [hint, location] of Object.entries(GEO_HINTS)) {
                if (hint.endsWith('.') && prefix2.startsWith(hint)) {
                    return location;
                }
                if (!hint.endsWith('.') && prefix.startsWith(hint)) {
                    return location;
                }
            }
            return '未知';
        }

        async function testSTUNServer(addr) {
            const [host, port] = addr.split(':');
            const startTime = performance.now();
            
            try {
                const pc = new RTCPeerConnection({
                    iceServers: [{ urls: `stun:${addr}` }]
                });

                return new Promise((resolve) => {
                    const timeout = setTimeout(() => {
                        pc.close();
                        resolve({ addr, latency: null, status: '超时' });
                    }, 3000);

                    let stunSuccess = false;
                    let latency = null;
                    
                    pc.createDataChannel('test');
                    
                    pc.onicecandidate = (event) => {
                        if (event.candidate) {
                            const candidate = event.candidate.candidate;
                            
                            if (candidate.includes('typ srflx') || candidate.includes('typ prflx')) {
                                if (!stunSuccess) {
                                    latency = Math.round(performance.now() - startTime);
                                    stunSuccess = true;
                                    clearTimeout(timeout);
                                    pc.close();
                                    resolve({ addr, latency, status: '✓ 可用 (STUN)' });
                                }
                            }
                        }
                    };

                    pc.onicegatheringstatechange = () => {
                        if (pc.iceGatheringState === 'complete') {
                            clearTimeout(timeout);
                            pc.close();
                            if (stunSuccess) {
                                resolve({ addr, latency, status: '✓ 可用 (STUN)' });
                            } else {
                                resolve({ addr, latency: null, status: '未获取到反射候选' });
                            }
                        }
                    };

                    pc.createOffer().then(offer => pc.setLocalDescription(offer)).catch(() => {});
                });
            } catch (error) {
                return { addr, latency: null, status: '错误: ' + error.message };
            }
        }

        function addResultRow(result) {
            const [ip] = result.addr.split(':');
            const geo = getGeoHint(ip);
            
            let latencyClass = 'failed';
            let latencyText = '失败';
            
            if (result.latency !== null) {
                if (result.latency < 50) latencyClass = 'excellent';
                else if (result.latency < 100) latencyClass = 'good';
                else if (result.latency < 200) latencyClass = 'average';
                else latencyClass = 'poor';
                latencyText = result.latency + ' ms';
            }
            
            const row = document.createElement('div');
            row.className = 'result-item';
            row.innerHTML = `
                <div class="server-addr">${result.addr}</div>
                <div class="latency ${latencyClass}">${latencyText}</div>
                <div class="status">${result.status}</div>
                <div class="geo-info">${geo}</div>
            `;
            
            const list = document.getElementById('resultsList');
            const items = Array.from(list.children);
            let inserted = false;
            
            for (let i = 0; i < items.length; i++) {
                const existingLatency = results.find(r => r.addr === items[i].querySelector('.server-addr').textContent)?.latency;
                if (existingLatency === null || existingLatency === undefined) {
                    continue;
                }
                if (result.latency !== null && result.latency < existingLatency) {
                    list.insertBefore(row, items[i]);
                    inserted = true;
                    break;
                }
            }
            
            if (!inserted) {
                list.appendChild(row);
            }
        }

        function updateProgress(completed, total) {
            const percent = Math.round((completed / total) * 100);
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressFill').textContent = `${completed}/${total} (${percent}%)`;
        }

        function finishTest() {
            testing = false;
            document.getElementById('testAllBtn').disabled = false;
            document.getElementById('testTopBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            
            const successful = results.filter(r => r.latency !== null);
            const failed = results.filter(r => r.latency === null);
            const avgLatency = successful.length > 0 
                ? Math.round(successful.reduce((sum, r) => sum + r.latency, 0) / successful.length) 
                : 0;
            
            successful.sort((a, b) => a.latency - b.latency);
            bestServers = successful.slice(0, 5);
            
            document.getElementById('totalServers').textContent = results.length;
            document.getElementById('successCount').textContent = successful.length;
            document.getElementById('failedCount').textContent = failed.length;
            document.getElementById('avgLatency').textContent = avgLatency;
            
            const bestList = document.getElementById('bestServersList');
            bestList.innerHTML = '';
            bestServers.forEach(server => {
                const badge = document.createElement('span');
                badge.className = 'best-server';
                badge.textContent = `${server.addr} (${server.latency}ms)`;
                badge.onclick = () => {
                    navigator.clipboard.writeText(`stun:${server.addr}`);
                    badge.textContent = '已复制!';
                    setTimeout(() => {
                        badge.textContent = `${server.addr} (${server.latency}ms)`;
                    }, 1000);
                };
                badge.style.cursor = 'pointer';
                bestList.appendChild(badge);
            });
            
            document.getElementById('summary').style.display = 'block';
        }

        async function testAllServers() {
            if (testing) return;
            
            testing = true;
            stopped = false;
            results = [];
            bestServers = [];
            
            document.getElementById('testAllBtn').disabled = true;
            document.getElementById('testTopBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('summary').style.display = 'none';
            document.getElementById('progressBar').style.display = 'block';
            document.getElementById('resultsList').innerHTML = '';
            
            const total = STUN_SERVERS.length;
            let completed = 0;
            
            const batchSize = 3;
            for (let i = 0; i < total; i += batchSize) {
                if (stopped) break;
                
                const batch = STUN_SERVERS.slice(i, i + batchSize);
                const batchResults = await Promise.all(batch.map(testSTUNServer));
                
                batchResults.forEach(result => {
                    results.push(result);
                    addResultRow(result);
                });
                
                completed += batch.length;
                updateProgress(completed, total);
            }
            
            finishTest();
        }

        async function testTopServers() {
            if (testing) return;
            
            testing = true;
            stopped = false;
            results = [];
            bestServers = [];
            
            document.getElementById('testAllBtn').disabled = true;
            document.getElementById('testTopBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('summary').style.display = 'none';
            document.getElementById('progressBar').style.display = 'block';
            document.getElementById('resultsList').innerHTML = '';
            
            const serversToTest = [
                'stun.l.google.com:19302',
                'stun1.l.google.com:19302',
                'stun2.l.google.com:19302',
                'stun.qq.com:3478',
                'stun.miwifi.com:3478'
            ];
            
            const total = serversToTest.length;
            let completed = 0;
            
            for (const addr of serversToTest) {
                if (stopped) break;
                
                const result = await testSTUNServer(addr);
                results.push(result);
                addResultRow(result);
                
                completed++;
                updateProgress(completed, total);
                
                await new Promise(r => setTimeout(r, 100));
            }
            
            finishTest();
        }

        function stopTest() {
            stopped = true;
            document.getElementById('stopBtn').disabled = true;
        }

        function clearResults() {
            results = [];
            bestServers = [];
            document.getElementById('resultsList').innerHTML = '';
            document.getElementById('summary').style.display = 'none';
            document.getElementById('progressBar').style.display = 'none';
        }

        function copyBestServers() {
            if (bestServers.length === 0) {
                alert('请先运行测试!');
                return;
            }
            
            const config = bestServers.map(s => `stun:${s.addr}`).join('\n');
            navigator.clipboard.writeText(config);
            
            alert('已复制到剪贴板!\n\n格式: stun:IP:PORT');
        }
