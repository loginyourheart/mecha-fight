            border: 1px solid #333;

            margin-right: 20px;

        }

            width: 100%;
            height: 20px;

            border-radius: 10px;

            margin-bottom: 20px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;

            height: 100%;

            padding: 10px;

            margin-bottom: 10px;
            position: sticky;
            top: 0;
            z-index: 10;

        .summary {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            border: 1px solid #00d4ff;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;

        // 位置猜测
        function getGeoHint(addr) {
            if (addr.includes("google")) return "Google (美国)";
            if (addr.includes("qq.com")) return "腾讯 (中国)";
            if (addr.includes("miwifi")) return "小米 (中国)";
            if (addr.includes("nordvpn")) return "NordVPN";
            if (addr.includes("twilio")) return "Twilio";

            const ip = addr.split(":")[0];
            const firstOctet = parseInt(ip.split(".")[0]);

            // 中国IP范围大致判断
            if (firstOctet === 1 || firstOctet === 14 || firstOctet === 27 ||
                firstOctet === 36 || firstOctet === 42 || firstOctet === 43 ||
                firstOctet === 47 || firstOctet === 49 || firstOctet === 58 ||
                firstOctet === 59 || firstOctet === 60 || firstOctet === 61 ||
                (firstOctet >= 101 && firstOctet <= 127) ||
                (firstOctet >= 168 && firstOctet <= 223)) {
                return "中国";
            }

            if (firstOctet >= 52 && firstOctet <= 54) return "AWS (美国)";
            if (firstOctet === 3) return "AWS (美国)";
            if (firstOctet === 34) return "AWS (美国)";
            if (firstOctet === 44) return "AWS (美国)";

            if (firstOctet === 35) return "AWS (欧洲)";
            if (firstOctet === 143) return "DigitalOcean (新加坡)";
            if (firstOctet === 172) return "Fastly/其他";
            if (firstOctet === 124) return "Oracle Cloud";
            if (firstOctet === 147) return "Google Cloud";
            if (firstOctet === 199) return "Internet2 (美国)";
            if (firstOctet === 188) return "德国 (Hetzner)";
            if (firstOctet === 176) return "德国 (Hetzner)";
            if (firstOctet === 137) return "Scaleway (法国)";

            return "未知";
        }

        // 测试单个服务器（更稳定的实现）
        async function testSTUNServer(addr) {
            return new Promise((resolve) => {
                const startTime = performance.now();
                let resolved = false;
                let pc = null;

                const cleanup = () => {
                    if (pc) {
                        try {
                            pc.close();
                        } catch(e) {}
                        pc = null;
                    }
                };

                // 超时处理
                const timeout = setTimeout(() => {
                    if (resolved) return;
                    resolved = true;
                    cleanup();
                    resolve({
                        addr: addr,
                        latency: null,
                        status: "超时"
                    });
                }, 3000);

                try {
                    pc = new RTCPeerConnection({
                        iceServers: [{ urls: "stun:" + addr }]
                    });

                    pc.onicecandidate = (event) => {
                        if (resolved) return;
                        
                        if (event.candidate) {
                            const candidate = event.candidate.candidate;
                            
                            // 只接受服务器反射候选 (srflx) 或 对端反射候选 (prflx)
                            if (candidate.includes("srflx") || candidate.includes("prflx")) {
                                const latency = Math.round(performance.now() - startTime);
                                resolved = true;
                                clearTimeout(timeout);
                                cleanup();
                                resolve({
                                    addr: addr,
                                    latency: latency,
                                    status: "✓ 可用"
                                });
                            }
                        }
                    };

                    pc.onicegatheringstatechange = () => {
                        if (resolved) return;
                        
                        if (pc.iceGatheringState === "complete") {
                            // 收集完成但没有收到服务器反射候选
                            resolved = true;
                            clearTimeout(timeout);
                            cleanup();
                            resolve({
                                addr: addr,
                                latency: null,
                                status: "无反射候选"
                            });
                        }
                    };

                    // 创建数据通道触发ICE收集
                    pc.createDataChannel("test");
                    
                    // 开始ICE收集
                    pc.createOffer()
                        .then(offer => pc.setLocalDescription(offer))
                        .catch(() => {});
                } catch (error) {
                    if (resolved) return;
                    resolved = true;
                    clearTimeout(timeout);
                    cleanup();
                    resolve({
                        addr: addr,
                        latency: null,
                        status: "错误: " + error.message.substring(0, 20)
                    });
                }
            });
        }

        function addResultRow(result) {
            const [ip] = result.addr.split(":");
            const geo = getGeoHint(ip);
            
            let latencyClass = "failed";
            let latencyText = "失败";
            
            if (result.latency !== null) {
                if (result.latency < 100) latencyClass = "excellent";
                else if (result.latency < 200) latencyClass = "good";
                else if (result.latency < 400) latencyClass = "average";
                else latencyClass = "poor";
                latencyText = result.latency + " ms";
            }
            
            const row = document.createElement("div");
            row.className = "result-item";
            row.innerHTML = `
                <div class="server-addr">${result.addr}</div>
                <div class="latency ${latencyClass}">${latencyText}</div>
                <div class="status">${result.status}</div>
                <div class="geo-info">${geo}</div>
            `;
            
            // 按延迟排序插入
            const list = document.getElementById("resultsList");
            const items = Array.from(list.children);
            let inserted = false;
            
            for (let i = 0; i < items.length; i++) {
                const existing = results.find(r => r.addr === items[i].querySelector(".server-addr").textContent);
                if (!existing || existing.latency === null) continue;
                if (result.latency !== null && result.latency < existing.latency) {
                    list.insertBefore(row, items[i]);
                    inserted = true;
                    break;
                }
            }
            
            if (!inserted) {
                list.appendChild(row);
            }
        }

        function updateProgress(completed, total) {
            const percent = Math.round((completed / total) * 100);
            document.getElementById("progressFill").style.width = percent + "%";
            document.getElementById("progressFill").textContent = `${completed}/${total} (${percent}%)`;
        }

        async function testAllServers() {
            if (testing) return;
            
            testing = true;
            stopped = false;
            results = [];
            bestServers = [];
            
            document.getElementById("testAllBtn").disabled = true;
            document.getElementById("stopBtn").disabled = false;
            document.getElementById("summary").style.display = "none";
            document.getElementById("progressBar").style.display = "block";
            document.getElementById("resultsList").innerHTML = "";
            
            // 构建测试列表
            let serversToTest = [];
            if (document.getElementById("chkFofa").checked) {
                serversToTest = serversToTest.concat(FOFA_SERVERS);
            }
            if (document.getElementById("chkPublic").checked) {
                serversToTest = serversToTest.concat(PUBLIC_SERVERS);
            }
            
            if (serversToTest.length === 0) {
                alert("请至少选择一组服务器进行测试！");
                testing = false;
                document.getElementById("testAllBtn").disabled = false;
                return;
            }
            
            const total = serversToTest.length;
            let completed = 0;
            
            // 限制并发数，避免资源耗尽
            const concurrency = 3;
            for (let i = 0; i < total; i += concurrency) {
                if (stopped) break;
                
                const batch = serversToTest.slice(i, i + concurrency);
                const batchResults = await Promise.all(batch.map(testSTUNServer));
                
                batchResults.forEach(result => {
                    results.push(result);
                    addResultRow(result);
                });
                
                completed += batch.length;
                updateProgress(completed, total);
                
                // 小延迟避免浏览器卡顿
                await new Promise(r => setTimeout(r, 50));
            }
            
            finishTest();
        }

        function finishTest() {
            testing = false;
            document.getElementById("testAllBtn").disabled = false;
            document.getElementById("stopBtn").disabled = true;
            
            // 统计
            const successful = results.filter(r => r.latency !== null);
            const failed = results.filter(r => r.latency === null);
            const avgLatency = successful.length > 0 
                ? Math.round(successful.reduce((sum, r) => sum + r.latency, 0) / successful.length) 
                : 0;
            
            // 按延迟排序取前10
            successful.sort((a, b) => a.latency - b.latency);
            bestServers = successful.slice(0, 10);
            
            document.getElementById("totalServers").textContent = results.length;
            document.getElementById("successCount").textContent = successful.length;
            document.getElementById("failedCount").textContent = failed.length;
            document.getElementById("avgLatency").textContent = avgLatency;
            
            // 最佳服务器列表
            const bestList = document.getElementById("bestServersList");
            bestList.innerHTML = "";
            bestServers.forEach(server => {
                const badge = document.createElement("span");
                badge.className = "best-server";
                badge.textContent = `${server.addr} (${server.latency}ms)`;
                badge.onclick = () => {
                    navigator.clipboard.writeText(`stun:${server.addr}`);
                    badge.textContent = "已复制！";
                    setTimeout(() => {
                        badge.textContent = `${server.addr} (${server.latency}ms)`;
                    }, 1000);
                };
                badge.style.cursor = "pointer";
                bestList.appendChild(badge);
            });
            
            // 生成配置示例
            const configExample = document.getElementById("configExample");
            const iceConfig = {
                iceServers: bestServers.map(s => ({ urls: `stun:${s.addr}` })).concat([
                    { urls: "turn:numb.viagenie.ca", credential: "muazkh", username: "webrtc@live.com" },
                    { urls: "turn:openrelay.metered.ca:443", credential: "openrelayproject", username: "openrelayproject" }
                ])
            };
            configExample.textContent = JSON.stringify(iceConfig, null, 2);
            
            document.getElementById("summary").style.display = "block";
        }

        function stopTest() {
            stopped = true;
            document.getElementById("stopBtn").disabled = true;
        }

        function clearResults() {
            results = [];
            bestServers = [];
            document.getElementById("resultsList").innerHTML = "";
            document.getElementById("summary").style.display = "none";
            document.getElementById("progressBar").style.display = "none";
        }

        function copyBestServers() {
            if (bestServers.length === 0) {
                alert("请先运行测试！");
                return;
            }
            
            const config = {
                iceServers: bestServers.map(s => ({ urls: `stun:${s.addr}` })).concat([
                    { urls: "turn:numb.viagenie.ca", credential: "muazkh", username: "webrtc@live.com" },
                    { urls: "turn:openrelay.metered.ca:443", credential: "openrelayproject", username: "openrelayproject" }
                ])
            };
            
            const configText = JSON.stringify(config, null, 2);
            navigator.clipboard.writeText(configText);
            alert("配置已复制到剪贴板！");
        }
    </script>
