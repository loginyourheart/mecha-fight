<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成游戏图标</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a3e 0%, #2d1b4e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
            margin-bottom: 30px;
        }
        .preview-container {
            background: rgba(0,0,0,0.5);
            border: 3px solid #444;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }
        canvas {
            border: 2px solid #00ffff;
            border-radius: 8px;
            image-rendering: pixelated;
        }
        button {
            font-family: 'Arial', sans-serif;
            font-size: 18px;
            padding: 15px 30px;
            margin: 10px;
            background: #00aa00;
            border: 3px solid #00ff00;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background: #00cc00;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }
        .instructions {
            background: rgba(0,0,0,0.5);
            border: 2px solid #444;
            border-radius: 8px;
            padding: 20px;
            max-width: 600px;
            margin-top: 20px;
        }
        .instructions h3 {
            color: #ff9900;
            margin-top: 0;
        }
        .instructions ol {
            text-align: left;
        }
        .instructions li {
            margin: 10px 0;
        }
        code {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            color: #00ffff;
        }
    </style>
</head>
<body>
    <h1>🎮 游戏图标生成器</h1>
    
    <div class="preview-container">
        <h2>预览</h2>
        <canvas id="preview" width="128" height="128"></canvas>
        <div style="margin-top: 15px; color: #888; font-size: 14px;">
            32x32 像素图标预览 (放大显示)
        </div>
    </div>
    
    <button onclick="downloadFavicon()">下载 favicon.ico</button>
    <button onclick="downloadPng()">下载 favicon.png</button>
    
    <div class="instructions">
        <h3>📋 使用说明</h3>
        <ol>
            <li>点击上方按钮下载图标文件</li>
            <li>将 <code>favicon.ico</code> 复制到游戏项目根目录</li>
            <li>在游戏的 <code>&lt;head&gt;</code> 标签中添加：
                <br><code>&lt;link rel="icon" href="favicon.ico"&gt;</code></li>
            <li>刷新游戏页面即可看到图标</li>
        </ol>
    </div>
    
    <script>
        const canvas = document.getElementById('preview');
        const ctx = canvas.getContext('2d');
        
        // 颜色定义
        const colors = {
            transparent: 'rgba(0,0,0,0)',
            red: '#ff4444',
            darkRed: '#c8321e',
            yellow: '#ffff00',
            gray: '#555555',
            white: '#ffffff',
            black: '#000000'
        };
        
        // 像素艺术图案 (8x8)
        const pattern = [
            "........",
            "..GGGG..",
            ".GRRRRG.",
            ".GYYYYG.",
            ".GWWBWG.",
            ".GGGGGG.",
            "..RRRR..",
            "........"
        ];
        
        const colorMap = {
            '.': 'transparent',
            'G': 'gray',
            'R': 'red',
            'Y': 'yellow',
            'W': 'white',
            'B': 'black'
        };
        
        // 绘制图标
        function drawIcon(size) {
            ctx.clearRect(0, 0, size, size);
            const pixelSize = size / 8;
            
            // 绘制像素艺术
            for (let y = 0; y < 8; y++) {
                const row = pattern[y];
                for (let x = 0; x < 8; x++) {
                    const char = row[x];
                    const colorKey = colorMap[char];
                    
                    if (colorKey !== 'transparent') {
                        ctx.fillStyle = colors[colorKey];
                        ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
                    }
                }
            }
            
            // 绘制边框
            ctx.strokeStyle = colors.red;
            ctx.lineWidth = Math.max(2, size / 16);
            ctx.strokeRect(1, 1, size - 2, size - 2);
        }
        
        // 初始化预览
        drawIcon(128);
        
        // 下载ICO文件
        function downloadFavicon() {
            // 创建 32x32 的图标
            const size = 32;
            const iconCanvas = document.createElement('canvas');
            iconCanvas.width = size;
            iconCanvas.height = size;
            const iconCtx = iconCanvas.getContext('2d');
            
            // 复制绘制
            iconCtx.clearRect(0, 0, size, size);
            const pixelSize = size / 8;
            
            for (let y = 0; y < 8; y++) {
                const row = pattern[y];
                for (let x = 0; x < 8; x++) {
                    const char = row[x];
                    const colorKey = colorMap[char];
                    
                    if (colorKey !== 'transparent') {
                        iconCtx.fillStyle = colors[colorKey];
                        iconCtx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
                    }
                }
            }
            
            // 绘制边框
            iconCtx.strokeStyle = colors.red;
            iconCtx.lineWidth = 2;
            iconCtx.strokeRect(1, 1, size - 2, size - 2);
            
            // 转换为ICO格式
            const pngData = iconCanvas.toDataURL('image/png');
            const pngBase64 = pngData.split(',')[1];
            const pngBinary = atob(pngBase64);
            const pngBytes = new Uint8Array(pngBinary.length);
            for (let i = 0; i < pngBinary.length; i++) {
                pngBytes[i] = pngBinary.charCodeAt(i);
            }
            
            // 创建ICO文件
            const icoData = createIco([pngBytes], [size]);
            const blob = new Blob([icoData], { type: 'image/x-icon' });
            
            // 下载
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'favicon.ico';
            link.click();
            
            alert('✓ favicon.ico 已下载！\n\n请将其复制到游戏项目根目录。');
        }
        
        // 创建ICO文件
        function createIco(pngDataArray, sizes) {
            const numImages = pngDataArray.length;
            
            // ICO Header: 6 bytes
            const header = new ArrayBuffer(6);
            const headerView = new DataView(header);
            headerView.setUint16(0, 0, true);  // Reserved
            headerView.setUint16(2, 1, true);  // Type: ICO
            headerView.setUint16(4, numImages, true);  // Number of images
            
            // Directory entries: 16 bytes each
            const directorySize = 16 * numImages;
            const directory = new ArrayBuffer(directorySize);
            const directoryView = new DataView(directory);
            
            // Image data offset starts after header + directory
            let offset = 6 + directorySize;
            const imageDataList = [];
            
            for (let i = 0; i < numImages; i++) {
                const pngData = pngDataArray[i];
                const size = sizes[i];
                
                // Directory entry
                directoryView.setUint8(i * 16, size === 256 ? 0 : size);  // Width
                directoryView.setUint8(i * 16 + 1, size === 256 ? 0 : size);  // Height
                directoryView.setUint8(i * 16 + 2, 0);  // Color palette
                directoryView.setUint8(i * 16 + 3, 0);  // Reserved
                directoryView.setUint16(i * 16 + 4, 1, true);  // Color planes
                directoryView.setUint16(i * 16 + 6, 32, true);  // Bits per pixel
                directoryView.setUint32(i * 16 + 8, pngData.length, true);  // Image size
                directoryView.setUint32(i * 16 + 12, offset, true);  // Image offset
                
                offset += pngData.length;
                imageDataList.push(pngData);
            }
            
            // Combine all parts
            const result = new Uint8Array(6 + directorySize + offset - 6 - directorySize);
            result.set(new Uint8Array(header), 0);
            result.set(new Uint8Array(directory), 6);
            
            let pos = 6 + directorySize;
            for (const imgData of imageDataList) {
                result.set(imgData, pos);
                pos += imgData.length;
            }
            
            return result;
        }
        
        // 下载PNG文件
        function downloadPng() {
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'favicon.png';
            link.click();
            
            alert('✓ favicon.png 已下载！');
        }
    </script>
</body>
</html>
