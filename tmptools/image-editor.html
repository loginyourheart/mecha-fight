<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图片裁切 & 抠图工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; color: #fff; font-family: 'Courier New', monospace; padding: 20px; }
        h1 { color: #00ffff; margin-bottom: 15px; text-align: center; }
        .container { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .left { flex: 1; }
        .right { width: 400px; }
        .canvas-container { background: #000; border: 2px solid #00ffff; max-height: 600px; overflow: auto; position: relative; }
        canvas { display: block; cursor: crosshair; }
        .panel { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .panel h3 { color: #ff9900; margin-bottom: 10px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; margin-bottom: 3px; font-size: 12px; color: #aaa; }
        .form-group input { width: 100%; padding: 6px; background: #0a0a1a; border: 1px solid #444; color: #fff; border-radius: 4px; }
        .form-group input[type="number"] { width: 70px; }
        .form-group input[type="color"] { width: 50px; height: 30px; cursor: pointer; }
        .form-row { display: flex; gap: 10px; align-items: center; }
        button { background: #00ffff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-right: 8px; margin-bottom: 5px; }
        button:hover { background: #00cccc; }
        button.secondary { background: #ff9900; }
        button.danger { background: #ff4444; color: #fff; }
        button.success { background: #00ff00; }
        .info-bar { background: rgba(0,255,255,0.1); padding: 8px; margin-bottom: 10px; font-size: 12px; border-radius: 4px; }
        .color-picker-row { display: flex; gap: 10px; align-items: center; }
        .preview-canvas { background: repeating-conic-gradient(#808080 0% 25%, #404040 0% 50%) 50% / 16px 16px; border: 2px solid #ff9900; margin-top: 10px; }
        .instructions { background: rgba(255,153,0,0.1); border: 1px solid #ff9900; padding: 12px; margin-bottom: 15px; border-radius: 8px; }
        .instructions h4 { color: #ff9900; margin-bottom: 8px; }
        .instructions li { font-size: 12px; margin-bottom: 5px; margin-left: 20px; }
        .tool-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .tool-buttons button { flex: 1; min-width: 80px; }
        .tool-buttons button.active { background: #ff9900; }
        .transparency-bg { background: repeating-conic-gradient(#808080 0% 25%, #404040 0% 50%) 50% / 10px 10px; }
    </style>
</head>
<body>
    <h1>🖼️ 图片裁切 & 抠图工具</h1>

    <div class="instructions">
        <h4>📖 使用说明</h4>
        <ol>
            <li><strong>加载图片</strong>：点击"加载图片"按钮选择 anime.png</li>
            <li><strong>裁切工具</strong>：选择"裁切"模式，拖动鼠标框选区域</li>
            <li><strong>抠图工具</strong>：选择"抠图"模式，吸取背景色并调整容差</li>
            <li><strong>预览</strong>：点击"预览效果"查看处理结果</li>
            <li><strong>导出</strong>：点击"导出PNG"下载处理后的图片</li>
        </ol>
    </div>

    <div class="container">
        <div class="left">
            <div class="info-bar">
                <span id="mousePos">鼠标: -</span> | 
                <span id="imageSize">图片: 未加载</span> | 
                <span id="toolMode">模式: 裁切</span>
                <div style="margin-top: 5px;">
                    <button onclick="document.getElementById('fileInput').click()" style="padding: 5px 12px;">📂 加载图片</button>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="loadImage(this)">
                    <button onclick="resetView()" style="padding: 5px 12px;">🔄 重置视图</button>
                </div>
            </div>
            <div class="canvas-container" id="canvasContainer">
                <canvas id="mainCanvas"></canvas>
            </div>
        </div>

        <div class="right">
            <div class="panel">
                <h3>🔧 工具模式</h3>
                <div class="tool-buttons">
                    <button onclick="setTool('crop')" class="active" id="cropBtn">✂️ 裁切</button>
                    <button onclick="setTool('eyedropper')" id="eyedropperBtn">💧 吸管</button>
                    <button onclick="setTool('pan')" id="panBtn">🤚 移动</button>
                </div>
            </div>

            <div class="panel">
                <h3>✂️ 裁切设置</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>X</label>
                        <input type="number" id="cropX" value="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>Y</label>
                        <input type="number" id="cropY" value="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>宽</label>
                        <input type="number" id="cropWidth" value="0" min="1">
                    </div>
                    <div class="form-group">
                        <label>高</label>
                        <input type="number" id="cropHeight" value="0" min="1">
                    </div>
                </div>
                <button onclick="applyCrop()">✅ 应用裁切</button>
                <button onclick="clearCrop()" class="secondary">❌ 清除</button>
            </div>

            <div class="panel">
                <h3>🎨 抠图设置</h3>
                <div class="color-picker-row">
                    <div class="form-group" style="flex: 1;">
                        <label>背景色</label>
                        <div class="form-row">
                            <input type="color" id="bgColor" value="#00ff00">
                            <input type="text" id="bgColorHex" value="#00ff00" style="flex: 1; margin-left: 5px;">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>容差 (0-255)</label>
                    <input type="range" id="tolerance" min="0" max="255" value="30" style="width: 100%;">
                    <span id="toleranceValue">30</span>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="useTransparency"> 生成透明背景</label>
                </div>
                <button onclick="previewChromaKey()" class="secondary">👁️ 预览抠图</button>
                <button onclick="resetChromaKey()" class="secondary">🔄 重置</button>
            </div>

            <div class="panel">
                <h3>📤 导出</h3>
                <div style="display: flex; gap: 10px;">
                    <button onclick="exportPNG()" class="success" style="flex: 1;">📥 导出PNG</button>
                    <button onclick="exportWithConfig()" style="flex: 1;">📋 导出+配置</button>
                </div>
            </div>

            <div class="panel">
                <h3>👁️ 预览</h3>
                <canvas id="previewCanvas" class="preview-canvas" width="300" height="200"></canvas>
                <div id="previewInfo" style="font-size: 11px; color: #888; margin-top: 5px;">未预览</div>
            </div>
        </div>
    </div>

    <script>
        const mainCanvas = document.getElementById('mainCanvas');
        const mainCtx = mainCanvas.getContext('2d');
        const previewCanvas = document.getElementById('previewCanvas');
        const previewCtx = previewCanvas.getContext('2d');
        
        let originalImage = null;
        let currentTool = 'crop';
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let cropRect = null;
        let zoom = 1;
        let panOffset = { x: 0, y: 0 };
        let isPanning = false;
        let panStart = { x: 0, y: 0 };
        let chromaKeyApplied = false;
        let chromaKeySettings = { color: null, tolerance: 30, useTransparency: true };

        // 加载图片
        function loadImage(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    originalImage = img;
                    mainCanvas.width = img.width;
                    mainCanvas.height = img.height;
                    zoom = Math.min(800 / img.width, 500 / img.height);
                    if (zoom < 1) zoom = 1;
                    panOffset = { x: 0, y: 0 };
                    updateCanvasTransform();
                    drawMainCanvas();
                    document.getElementById('imageSize').textContent = `图片: ${img.width}×${img.height}`;
                    clearCrop();
                    resetChromaKey();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 设置工具模式
        function setTool(tool) {
            currentTool = tool;
            document.getElementById('toolMode').textContent = `模式: ${tool === 'crop' ? '裁切' : tool === 'eyedropper' ? '吸管' : '移动'}`;
            document.querySelectorAll('.tool-buttons button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tool + 'Btn').classList.add('active');
            mainCanvas.style.cursor = tool === 'eyedropper' ? 'crosshair' : tool === 'pan' ? 'move' : 'crosshair';
        }

        // 更新画布变换
        function updateCanvasTransform() {
            const container = document.getElementById('canvasContainer');
            mainCanvas.style.width = (mainCanvas.width * zoom) + 'px';
            mainCanvas.style.height = (mainCanvas.height * zoom) + 'px';
            mainCanvas.style.transform = `translate(${panOffset.x}px, ${panOffset.y}px)`;
        }

        // 绘制主画布
        function drawMainCanvas() {
            if (!originalImage) return;
            mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            mainCtx.drawImage(originalImage, 0, 0);
            
            // 绘制裁切框
            if (cropRect) {
                mainCtx.strokeStyle = '#00ffff';
                mainCtx.lineWidth = 2;
                mainCtx.strokeRect(cropRect.x, cropRect.y, cropRect.width, cropRect.height);
                mainCtx.fillStyle = 'rgba(0, 255, 255, 0.2)';
                mainCtx.fillRect(cropRect.x, cropRect.y, cropRect.width, cropRect.height);
                
                // 显示尺寸
                mainCtx.fillStyle = '#00ffff';
                mainCtx.font = '12px Courier New';
                mainCtx.fillText(`${cropRect.width}×${cropRect.height}`, cropRect.x + 5, cropRect.y + 15);
            }
        }

        // 获取鼠标在画布上的位置
        function getMousePos(e) {
            const rect = mainCanvas.getBoundingClientRect();
            const scaleX = mainCanvas.width / rect.width;
            const scaleY = mainCanvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        // 鼠标事件
        mainCanvas.addEventListener('mousedown', (e) => {
            const pos = getMousePos(e);
            
            if (currentTool === 'crop') {
                isDragging = true;
                dragStart = pos;
                cropRect = { x: pos.x, y: pos.y, width: 0, height: 0 };
            } else if (currentTool === 'eyedropper') {
                pickColor(pos);
            } else if (currentTool === 'pan') {
                isPanning = true;
                panStart = { x: e.clientX - panOffset.x, y: e.clientY - panOffset.y };
            }
        });

        mainCanvas.addEventListener('mousemove', (e) => {
            const pos = getMousePos(e);
            document.getElementById('mousePos').textContent = `鼠标: (${Math.floor(pos.x)}, ${Math.floor(pos.y)})`;
            
            if (currentTool === 'crop' && isDragging) {
                cropRect = {
                    x: Math.min(dragStart.x, pos.x),
                    y: Math.min(dragStart.y, pos.y),
                    width: Math.abs(pos.x - dragStart.x),
                    height: Math.abs(pos.y - dragStart.y)
                };
                drawMainCanvas();
                updateCropInputs();
            } else if (currentTool === 'pan' && isPanning) {
                panOffset.x = e.clientX - panStart.x;
                panOffset.y = e.clientY - panStart.y;
                updateCanvasTransform();
            }
        });

        mainCanvas.addEventListener('mouseup', () => {
            isDragging = false;
            isPanning = false;
        });

        mainCanvas.addEventListener('mouseleave', () => {
            isDragging = false;
            isPanning = false;
        });

        // 吸管工具 - 吸取颜色
        function pickColor(pos) {
            if (!originalImage) return;
            const pixel = mainCtx.getImageData(Math.floor(pos.x), Math.floor(pos.y), 1, 1).data;
            const hex = '#' + [pixel[0], pixel[1], pixel[2]].map(x => x.toString(16).padStart(2, '0')).join('');
            document.getElementById('bgColor').value = hex;
            document.getElementById('bgColorHex').value = hex;
            chromaKeySettings.color = hex;
        }

        // 更新裁切输入框
        function updateCropInputs() {
            if (cropRect) {
                document.getElementById('cropX').value = Math.floor(cropRect.x);
                document.getElementById('cropY').value = Math.floor(cropRect.y);
                document.getElementById('cropWidth').value = Math.floor(cropRect.width);
                document.getElementById('cropHeight').value = Math.floor(cropRect.height);
            }
        }

        // 应用裁切
        function applyCrop() {
            if (!originalImage) return;
            const x = parseInt(document.getElementById('cropX').value) || 0;
            const y = parseInt(document.getElementById('cropY').value) || 0;
            const w = parseInt(document.getElementById('cropWidth').value);
            const h = parseInt(document.getElementById('cropHeight').value);
            
            if (w <= 0 || h <= 0) {
                alert('请先选择裁切区域');
                return;
            }
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = w;
            tempCanvas.height = h;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(originalImage, x, y, w, h, 0, 0, w, h);
            
            const img = new Image();
            img.onload = function() {
                originalImage = img;
                mainCanvas.width = img.width;
                mainCanvas.height = img.height;
                zoom = Math.min(800 / img.width, 500 / img.height);
                if (zoom < 1) zoom = 1;
                panOffset = { x: 0, y: 0 };
                updateCanvasTransform();
                drawMainCanvas();
                document.getElementById('imageSize').textContent = `图片: ${img.width}×${img.height}`;
                clearCrop();
                resetChromaKey();
                alert('裁切成功！');
            };
            img.src = tempCanvas.toDataURL();
        }

        // 清除裁切
        function clearCrop() {
            cropRect = null;
            drawMainCanvas();
            document.getElementById('cropX').value = 0;
            document.getElementById('cropY').value = 0;
            document.getElementById('cropWidth').value = 0;
            document.getElementById('cropHeight').value = 0;
        }

        // 重置视图
        function resetView() {
            if (!originalImage) return;
            zoom = Math.min(800 / originalImage.width, 500 / originalImage.height);
            if (zoom < 1) zoom = 1;
            panOffset = { x: 0, y: 0 };
            updateCanvasTransform();
            drawMainCanvas();
        }

        // 容差滑块
        document.getElementById('tolerance').addEventListener('input', (e) => {
            document.getElementById('toleranceValue').textContent = e.target.value;
            chromaKeySettings.tolerance = parseInt(e.target.value);
        });

        // 背景色输入
        document.getElementById('bgColor').addEventListener('input', (e) => {
            document.getElementById('bgColorHex').value = e.target.value;
            chromaKeySettings.color = e.target.value;
        });

        document.getElementById('bgColorHex').addEventListener('change', (e) => {
            if (/^#[0-9A-Fa-f]{6}$/.test(e.target.value)) {
                document.getElementById('bgColor').value = e.target.value;
                chromaKeySettings.color = e.target.value;
            }
        });

        document.getElementById('useTransparency').addEventListener('change', (e) => {
            chromaKeySettings.useTransparency = e.target.checked;
        });

        // 预览抠图
        function previewChromaKey() {
            if (!originalImage) {
                alert('请先加载图片');
                return;
            }
            
            const x = cropRect ? cropRect.x : 0;
            const y = cropRect ? cropRect.y : 0;
            const w = cropRect ? cropRect.width : originalImage.width;
            const h = cropRect ? cropRect.height : originalImage.height;
            
            const color = chromaKeySettings.color || '#00ff00';
            const r = parseInt(color.slice(1, 3), 16);
            const g = parseInt(color.slice(3, 5), 16);
            const b = parseInt(color.slice(5, 7), 16);
            const tolerance = chromaKeySettings.tolerance;
            const useTransparency = chromaKeySettings.useTransparency;
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = w;
            tempCanvas.height = h;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(originalImage, x, y, w, h, 0, 0, w, h);
            
            const imageData = tempCtx.getImageData(0, 0, w, h);
            const data = imageData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                const dr = Math.abs(data[i] - r);
                const dg = Math.abs(data[i + 1] - g);
                const db = Math.abs(data[i + 2] - b);
                const diff = Math.sqrt(dr * dr + dg * dg + db * db);
                
                if (diff < tolerance) {
                    if (useTransparency) {
                        data[i + 3] = 0; // 完全透明
                    } else {
                        // 白色背景
                        data[i] = 255;
                        data[i + 1] = 255;
                        data[i + 2] = 255;
                    }
                }
            }
            
            tempCtx.putImageData(imageData, 0, 0);
            
            // 缩放预览
            previewCanvas.width = w;
            previewCanvas.height = h;
            const scale = Math.min(300 / w, 200 / h);
            previewCtx.clearRect(0, 0, 300, 200);
            previewCtx.imageSmoothingEnabled = false;
            previewCtx.drawImage(tempCanvas, 0, 0, w * scale, h * scale);
            
            document.getElementById('previewInfo').textContent = `尺寸: ${w}×${h} | 容差: ${tolerance}`;
            chromaKeyApplied = true;
        }

        // 重置抠图
        function resetChromaKey() {
            chromaKeyApplied = false;
            if (originalImage) {
                previewCanvas.width = 300;
                previewCanvas.height = 200;
                previewCtx.clearRect(0, 0, 300, 200);
                const scale = Math.min(300 / originalImage.width, 200 / originalImage.height);
                previewCtx.drawImage(originalImage, 0, 0, originalImage.width * scale, originalImage.height * scale);
            }
            document.getElementById('previewInfo').textContent = '未预览';
        }

        // 导出PNG
        function exportPNG() {
            if (!originalImage) {
                alert('请先加载图片');
                return;
            }
            
            let exportCanvas = document.createElement('canvas');
            let exportCtx = exportCanvas.getContext('2d');
            
            const x = cropRect ? cropRect.x : 0;
            const y = cropRect ? cropRect.y : 0;
            const w = cropRect ? cropRect.width : originalImage.width;
            const h = cropRect ? cropRect.height : originalImage.height;
            
            exportCanvas.width = w;
            exportCanvas.height = h;
            
            if (chromaKeyApplied) {
                const color = chromaKeySettings.color || '#00ff00';
                const r = parseInt(color.slice(1, 3), 16);
                const g = parseInt(color.slice(3, 5), 16);
                const b = parseInt(color.slice(5, 7), 16);
                const tolerance = chromaKeySettings.tolerance;
                const useTransparency = chromaKeySettings.useTransparency;
                
                exportCtx.drawImage(originalImage, x, y, w, h, 0, 0, w, h);
                const imageData = exportCtx.getImageData(0, 0, w, h);
                const data = imageData.data;
                
                for (let i = 0; i < data.length; i += 4) {
                    const dr = Math.abs(data[i] - r);
                    const dg = Math.abs(data[i + 1] - g);
                    const db = Math.abs(data[i + 2] - b);
                    const diff = Math.sqrt(dr * dr + dg * dg + db * db);
                    
                    if (diff < tolerance) {
                        if (useTransparency) {
                            data[i + 3] = 0;
                        } else {
                            data[i] = 255;
                            data[i + 1] = 255;
                            data[i + 2] = 255;
                        }
                    }
                }
                
                exportCtx.putImageData(imageData, 0, 0);
            } else {
                exportCtx.drawImage(originalImage, x, y, w, h, 0, 0, w, h);
            }
            
            const link = document.createElement('a');
            link.download = 'processed_sprite.png';
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
        }

        // 导出+配置
        function exportWithConfig() {
            if (!originalImage) {
                alert('请先加载图片');
                return;
            }
            
            const x = cropRect ? cropRect.x : 0;
            const y = cropRect ? cropRect.y : 0;
            const w = cropRect ? cropRect.width : originalImage.width;
            const h = cropRect ? cropRect.height : originalImage.height;
            
            const config = {
                originalSize: { width: originalImage.width, height: originalImage.height },
                cropRegion: { x: x, y: y, width: w, height: h },
                chromaKey: chromaKeyApplied ? {
                    color: chromaKeySettings.color,
                    tolerance: chromaKeySettings.tolerance,
                    useTransparency: chromaKeySettings.useTransparency
                } : null
            };
            
            console.log('图片配置:', JSON.stringify(config, null, 2));
            alert('配置已打印到控制台 (F12)');
            
            // 同时导出图片
            exportPNG();
        }

        // 初始化
        resetChromaKey();
    </script>
</body>
</html>
